# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  helm-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

    - run: helm lint deploy/helm

  lint-verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'

    - name: fmt
      run: make fmt

    - name: vet
      run: make vet

    - name: lint
      run: make lint

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'

    - name: Test
      run: make test

  get-k8s-versions:
    runs-on: ubuntu-latest

    outputs:
      versions: ${{ steps.get-k8s-versions.outputs.kind_versions }}

    steps:
      - name: Get latest Kubernetes versions
        id: get-k8s-versions
        uses: tamcore/charts/.github/actions/latest-k8s-versions@master
        with:
          count: 3
          kind_images: true

  e2e:
    needs:
      - get-k8s-versions
      - helm-lint
    #   - lint-verify
    #   - test

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJson(needs.get-k8s-versions.outputs.versions) }}

    steps:
    - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'

    - name: Download prebuilt binaries
      run: make prebuilts

    - name: Create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
      with:
        node_image: "kindest/node:${{ matrix.k8s_version }}"
        cluster_name: kind-cluster-${{ matrix.k8s_version }}
        config: tests/e2e/kind.yaml

    - name: Install imagepullsecret-patcher into kind cluster
      run: make ko-build-kind ko-kind-install KIND_CLUSTER_NAME=kind-cluster-${{ matrix.k8s_version }}

    - name: Run chainsaw e2e tests
      run: make e2e

    - name: fetch logs
      if: failure()
      run: |
        mkdir -p /tmp/logs
        kind export logs --name kind-cluster-${{ matrix.k8s_version }} /tmp/logs

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: failure()
      with:
        name: kind_v${{ matrix.k8s_version }}
        path: /tmp/logs
